name: CMake on multiple platforms

on:
  push:
    tags: ["*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  release:
    types:
      - prereleased
      - released
  schedule:
    # 5AM every Monday, to catch breaks due to changes in dependencies
    - cron: "0 5 * * 1"

permissions:
  contents: read

jobs:
  release-gate:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.gate.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: gate
        name: Decide whether to publish release assets
        run: |
          should_release=false

          if [[ "${{ github.event_name }}" == "release" ]]; then
            should_release=true
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            default_branch="${{ github.event.repository.default_branch }}"
            git fetch origin "${default_branch}" --depth=1

            if git merge-base --is-ancestor "${GITHUB_SHA}" "origin/${default_branch}"; then
              should_release=true
            fi
          fi

          echo "should_release=${should_release}" >> "$GITHUB_OUTPUT"

  build-nix:
    needs: release-gate
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        os: [ubuntu-latest]
        build_type: [Release]
        library_type: [shared ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.13

      - name: Install Conan
        run: pip install conan

      - name: Configure Conan
        run: |
          conan profile detect

      - name: Install SWIG (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install swig

      - name: Install dependencies
        run: |
          conan install . --build=missing -s build_type=Release
          conan install . --build=missing -s build_type=Debug

      # Usage of cmake workflow feature prevents passing options via -D thereby
      # creating a lot of duplicated code in the CMakePresets.txt. For this
      # reason, we use the cmake --preset command.
      - name: Configure CMake
        run: >
          cmake --preset ${{ matrix.build_type }}-${{ matrix.library_type }}

      - name: Build
        run: cmake --build --preset ${{ matrix.build_type }}-${{ matrix.library_type }}

      # - name: Test
        # run: ctest --preset ${{ matrix.build_type }}-${{ matrix.library_type }}

      - name: Package
        if: ${{ matrix.build_type == 'Release' && needs.release-gate.outputs.should_release == 'true' }}
        run: |
          cpack --preset ${{ matrix.build_type }}-${{ matrix.library_type }}

      # Packages are put in the current working directory to prevent path
      # incompatibilities between Windows and Linux/Mac
      - name: Upload tarballs
        uses: actions/upload-artifact@v4
        if: ${{ matrix.build_type == 'Release' && needs.release-gate.outputs.should_release == 'true' }}
        with:
          name: ${{ matrix.os }}-${{ matrix.build_type }}-${{ matrix.library_type }}.tar.gz
          path: |
            soar-*.tar.gz
      - name: Upload Debian
        uses: actions/upload-artifact@v4
        if: ${{ matrix.build_type == 'Release' &&  (matrix.os == 'ubuntu-latest') && needs.release-gate.outputs.should_release == 'true' }}
        with:
          name: ${{ matrix.os }}-${{ matrix.build_type }}-${{ matrix.library_type }}.deb
          path: |
            soar-*.deb

  integration-test:
    needs: release-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.13

      - name: Install Conan
        run: pip install conan

      - name: Configure Conan
        run: conan profile detect

      - name: Install dependencies
        run: conan install . --build=missing -s build_type=Release

      - name: Run integration tests
        run: bash integration.sh

  publish-release:
    needs: [release-gate, build-nix, integration-test]
    if: ${{ needs.release-gate.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create or update GitHub release with CPack assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: false
          files: |
            release-assets/**/*.tar.gz
            release-assets/**/*.deb
